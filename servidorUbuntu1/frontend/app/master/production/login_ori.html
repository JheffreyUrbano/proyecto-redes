<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <!-- Meta, title, CSS, favicons, etc. -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Sistema de Gestión | Login</title>

    <!-- Bootstrap -->
    <link href="../vendors/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="../vendors/font-awesome/css/font-awesome.min.css" rel="stylesheet">
    <!-- NProgress -->
    <link href="../vendors/nprogress/nprogress.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="../vendors/animate.css/animate.min.css" rel="stylesheet">

    <!-- Custom Theme Style -->
    <link href="../build/css/custom.min.css" rel="stylesheet">
</head>

<body class="login">
    <div>
        <a class="hiddenanchor" id="signup"></a>
        <a class="hiddenanchor" id="signin"></a>

        <div class="login_wrapper">
            <div class="animate form login_form">
                <section class="login_content">
                    <form onsubmit="event.preventDefault(); window.location.href='index.html';">
                        <h1>Iniciar Sesión</h1>
                        <h5>Sistema de Gestión</h5>
                        <br>
                        <div>
                            <input type="text" class="form-control" placeholder="Usuario" required="" autofocus />
                        </div>
                        <div>
                            <input type="password" class="form-control" placeholder="Contraseña" required="" />
                        </div>
                        <div>
                            <button type="submit" class="btn btn-primary submit">
                                <i class="fa fa-sign-in"></i> Ingresar
                            </button>
                            <a class="reset_pass" href="#">¿Olvidaste tu contraseña?</a>
                        </div>

                        <div class="clearfix"></div>

                        <div class="separator">
                            <p class="change_link">
                                ¿Nuevo en el sitio?
                                <a href="#signup" class="to_register"> Crear Cuenta </a>
                            </p>

                            <div class="clearfix"></div>
                            <br />

                            <div>
                                <h1><i class="fa fa-database"></i> Sistema Gestión</h1>
                                <p>© 2026 Todos los derechos reservados.</p>
                            </div>
                        </div>
                    </form>
                </section>
            </div>

            <div id="register" class="animate form registration_form">
                <section class="login_content">
                    <form onsubmit="event.preventDefault(); alert('Registro deshabilitado por ahora');">
                        <h1>Crear Cuenta</h1>
                        <div>
                            <input type="text" class="form-control" placeholder="Nombre completo" required="" />
                        </div>
                        <div>
                            <input type="text" class="form-control" placeholder="Usuario" required="" />
                        </div>
                        <div>
                            <input type="email" class="form-control" placeholder="Email" required="" />
                        </div>
                        <div>
                            <input type="password" class="form-control" placeholder="Contraseña" required="" />
                        </div>
                        <div>
                            <input type="password" class="form-control" placeholder="Confirmar Contraseña" required="" />
                        </div>
                        <div>
                            <button type="submit" class="btn btn-success">
                                <i class="fa fa-user-plus"></i> Registrar
                            </button>
                        </div>

                        <div class="clearfix"></div>

                        <div class="separator">
                            <p class="change_link">
                                ¿Ya tienes cuenta?
                                <a href="#signin" class="to_register"> Iniciar Sesión </a>
                            </p>

                            <div class="clearfix"></div>
                            <br />

                            <div>
                                <h1><i class="fa fa-database"></i> Sistema Gestión</h1>
                                <p>© 2026 Todos los derechos reservados.</p>
                            </div>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="../vendors/jquery/dist/jquery.min.js"></script>
    <!-- Bootstrap -->
    <script src="../vendors/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Redirigir al hacer clic en cualquier enlace "Log in" adicional
        $(document).ready(function() {
            $('.btn-default[href="index.html"]').click(function(e) {
                e.preventDefault();
                window.location.href = 'index.html';
            });

            // Login con Enter también redirige
            $('#password').keypress(function(e) {
                if (e.which === 13) {
                    window.location.href = 'index.html';
                }
            });
        });
    </script>
</body>
</html>
